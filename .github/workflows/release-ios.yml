name: Release iOS to TestFlight

# Triggers on version tags (v1.0.0, v1.0.1, ...) or manually from the
# Actions tab. Builds a signed IPA and uploads it to TestFlight; promote
# to the App Store from App Store Connect.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-and-upload:
    name: Build IPA and upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # .env is gitignored (bundled as a Flutter asset at build time),
      # so CI reconstructs it from a repository secret.
      - name: Create .env from secret
        run: echo "${{ secrets.DOTENV_BASE64 }}" | base64 --decode > .env

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Import distribution certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/befit-appstore.mobileprovision

      - name: Build signed IPA
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Locate IPA
        id: ipa
        run: echo "path=$(ls build/ios/ipa/*.ipa | head -1)" >> "$GITHUB_OUTPUT"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ steps.ipa.outputs.path }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}

      - name: Upload IPA as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: ${{ steps.ipa.outputs.path }}
          retention-days: 30
