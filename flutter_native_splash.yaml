# BeFit AI — native splash screen configuration
#
# Regenerate with:
#   python3 python/splash-builder.py
# (or directly: dart run flutter_native_splash:create)
#
# Restore Flutter's default splash with:
#   dart run flutter_native_splash:remove

flutter_native_splash:
  # Solid splash background (brand black)
  color: "#000000"

  # Centre splash image — png sized for 4x pixel density
  image: assets/icon/befit_logo.png

  # Dark mode uses the same brand black + logo
  color_dark: "#000000"
  image_dark: assets/icon/befit_logo.png

  # Android 12+ renders the splash as a centred icon clipped to a circle.
  # Icon without background: 1152×1152 px, artwork within a 768 px circle.
  android_12:
    image: assets/icon/befit_logo.png
    color: "#000000"
    image_dark: assets/icon/befit_logo.png
    color_dark: "#000000"

  # Hide the status bar during splash
  fullscreen: true
