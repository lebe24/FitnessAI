name: fitness
description: "Befit AI - Your Personal Fitness Assistant tailored for you."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.0
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  font_awesome_flutter: ^10.12.0
