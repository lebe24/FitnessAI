name: fitness
description: "Befit AI - Your Personal Fitness Assistant tailored for you."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.0
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  go_router: ^16.3.0
  google_fonts: ^6.3.2
  image_picker: ^1.2.0
  google_sign_in: ^7.2.0
  equatable: ^2.0.7
  flutter_animate: ^4.5.2
  flutter_bloc: ^9.1.1
  supabase_flutter: ^2.10.3
  get_it: ^9.0.5
  modal_bottom_sheet: ^3.0.0
  dio: ^5.9.0
  flutter_dotenv: ^6.0.0
  fl_chart: ^1.1.1
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  uuid: ^4.5.1
  path: ^1.9.0
  web_socket_channel: ^2.4.0
  youtube_player_flutter: ^9.1.3
  carousel_slider: ^5.1.1
  just_audio: ^0.10.5
  flutter_native_splash: ^2.3.3
  google_maps_flutter: ^2.14.0
  custom_info_window: ^1.0.1
  animate_do: ^4.2.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  bloc_test: ^10.0.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  ios: true
  android: true
  image_path: assets/icon/app_icon.png
  remove_alpha_ios: true
  
flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/image/
    - assets/icon/
    - assets/logo/
    - assets/